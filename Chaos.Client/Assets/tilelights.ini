; Dynamic tile lights
;
; Each light is its own [<sprite_id>] section. <sprite_id> is the foreground tile the light is attached to (open the
; map in the editor and read the foreground tile under the lamp). When that tile appears on a map at night, a coloured
; glow is drawn on it.
;
; This file is embedded in the exe as the default. An external Data/tilelights.ini overrides it. The boot log prints
; which file was loaded and how many lights, so you can see which one won. Restart to apply.
;
; Keys inside a [<sprite_id>] section (all optional, you'll usually set shape and color):
;   shape       round or spotlight. round is a lit disc, spotlight is a downward cone from the source
;   x           glow offset in px, right is +, left is -. nudge it onto the flame.        default 0
;   y           glow offset in px, down is +, up is -. for a spotlight this is where the cone starts.  default 0
;   color       R, G, B from 0 to 255 each. warm lamp 255,220,160, cold moonlight 170,200,255.  default 255,220,160
;   kind        solid or flame. flame flickers and jitters a little, solid is steady.    default solid
;   radius      overall size in px. default about 96 round, 90 spotlight. a spotlight's length is about 1.45x this.
;   brightness  0 to 2 light strength. 1 is full, below 1 dimmer, above 1 punchier against the dark.  default 1.0
;   soft        0 to 1 edge softness. 0 is a hard edge, 1 falls off from the centre.   default 0.45 spot, 0.7 round
;   angle       5 to 160, spotlight only. the cone's full apex angle in degrees.       default 80
;   source      0 to 0.9, spotlight only. beam width at the source, as a fraction of the final width.  default 0.16
;   pool        0.05 to 0.95, spotlight only. bottom fraction of the beam that rounds into the ground pool. default 0.38
;   flicker     0 to 3, flame only. flicker strength. 0 is steady, 1 is stock, higher is wilder.  default 1.0
;   speed       0.1 to 5, flame only. flicker tempo.   default 1.0
;   ignore      a, b, c. foreground tile ids this light is never blocked by, such as its own post.
;
; [no_shadow] is a plain list of foreground tile ids (one per line, or comma-separated) that never block any light, so
; they cast no shadow. Put lamp posts, thin railings and decorative bits here so they don't throw odd shadows across a
; pool. A light's own emitter tile is always a non-occluder automatically.

; Tiles below came from matching the retail baked light maps against the foreground tile under each glow, then checking
; each sprite by eye. Offsets, radii, colours and brightness are starting values, tune them in-world. Some street lamps
; are two tiles wide (a left half and a right half, both listed). If a lamp's pool reads too hot, drop the brightness on
; its pair.

; ============================ STREET LAMPS (spotlight, lantern or globe on a pole) ============================

[16103]
; Mileth street lamp, hanging lantern on a curved arm. the main town lamp.
; its post (16101 and 16102) is in [no_shadow] so it never blocks its own light.
shape = spotlight
x = 0
y = -80
color = 255, 165, 90
kind = solid
radius = 79

[2047]
; Tall iron street lamp, lantern on a fluted pole. the most common town lamp.
shape = spotlight
y = -100
color = 191, 123, 67
radius = 96

